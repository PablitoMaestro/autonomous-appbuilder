name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          set -e
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json hooks/hooks.json; do
            echo "Validating $f"
            jq empty "$f"
          done

      - name: Verify required manifest fields are non-empty
        run: |
          set -e
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json; do
            jq -e '
              (.name | type == "string" and length > 0) and
              (.description | type == "string" and length > 0) and
              (.version | type == "string" and length > 0)
            ' "$f" >/dev/null \
              || { echo "$f: name/description/version missing or empty"; exit 1; }
          done

      - name: Verify dev-mode symlinks
        run: |
          set -e
          for link in .claude/skills .agents/skills; do
            [ -L "$link" ] || { echo "$link is not a symlink"; exit 1; }
            target=$(readlink "$link")
            [ "$target" = "../skills" ] || { echo "$link points to $target, expected ../skills"; exit 1; }
          done

      - name: Verify every skill has SKILL.md with non-empty description
        run: |
          set -e
          fail=0
          for dir in skills/[0-9][0-9]-*/; do
            f="${dir}SKILL.md"
            [ -f "$f" ] || { echo "MISSING: $f"; fail=1; continue; }
            head -1 "$f" | grep -q '^---$' || { echo "NO FRONTMATTER: $f"; fail=1; continue; }
            desc=$(awk '/^---$/{n++; next} n==1 && /^description:/{sub(/^description:[[:space:]]*/, ""); print; exit}' "$f")
            if [ -z "$(echo "$desc" | tr -d '[:space:]')" ]; then
              echo "EMPTY description IN FRONTMATTER: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Count skills (sanity)
        run: |
          n=$(find skills -name SKILL.md | wc -l | tr -d ' ')
          echo "skill count: $n"
          [ "$n" -ge 8 ] || { echo "expected at least 8 skills, got $n"; exit 1; }

      - name: Verify intra-plugin Skill('NN-name') refs point to existing skills
        run: |
          set -e
          # Extract every Skill('NN-...') reference from skill markdown,
          # check the referenced skill folder exists.
          fail=0
          existing=$(find skills -maxdepth 1 -mindepth 1 -type d -name '[0-9][0-9]-*' -exec basename {} \; | sort -u)
          refs=$(grep -rohE "Skill\('([0-9]{2}-[a-z-]+)'" skills/ | sed -E "s/.*Skill\('([^']+)'.*/\1/" | sort -u)
          for r in $refs; do
            if ! echo "$existing" | grep -qx "$r"; then
              echo "STALE REF: Skill('$r') is referenced but no skills/$r/ exists"
              fail=1
            fi
          done
          if [ $fail -eq 0 ]; then
            echo "All intra-plugin Skill() refs resolve."
          else
            exit 1
          fi
