name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          set -e
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json hooks/hooks.json; do
            echo "Validating $f"
            jq empty "$f"
          done

      - name: Verify required manifest fields
        run: |
          set -e
          for f in .claude-plugin/plugin.json .codex-plugin/plugin.json; do
            jq -e '.name and .description and .version' "$f" >/dev/null \
              || { echo "$f missing required fields (name/description/version)"; exit 1; }
          done

      - name: Verify dev-mode symlinks
        run: |
          set -e
          for link in .claude/skills .agents/skills; do
            [ -L "$link" ] || { echo "$link is not a symlink"; exit 1; }
            target=$(readlink "$link")
            [ "$target" = "../skills" ] || { echo "$link points to $target, expected ../skills"; exit 1; }
          done

      - name: Verify every skill has SKILL.md with frontmatter
        run: |
          set -e
          fail=0
          for dir in skills/[0-9][0-9]-*/; do
            f="${dir}SKILL.md"
            [ -f "$f" ] || { echo "MISSING: $f"; fail=1; continue; }
            head -1 "$f" | grep -q '^---$' || { echo "NO FRONTMATTER: $f"; fail=1; }
            grep -m1 '^description:' "$f" >/dev/null \
              || { echo "NO description IN FRONTMATTER: $f"; fail=1; }
          done
          [ $fail -eq 0 ] || exit 1

      - name: Count skills (sanity)
        run: |
          n=$(find skills -name SKILL.md | wc -l | tr -d ' ')
          echo "skill count: $n"
          [ "$n" -ge 8 ] || { echo "expected at least 8 skills, got $n"; exit 1; }
